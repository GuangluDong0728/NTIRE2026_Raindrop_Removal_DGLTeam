name: RainDrop_Testset
suffix: ~
model_type: TestAllTricksModel
scale: 1
crop_border: 0  # crop border when evaluation. If None, crop the scale pixels
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 0

datasets:
  test_1:
    name: Val_LQ
    type: PairedImageDataset
    dataroot_gt: /root/autodl-tmp/unsupervised deraining/datasets/NTIRE_Raindrop/test
    dataroot_lq: /root/autodl-tmp/unsupervised deraining/datasets/NTIRE_Raindrop/test
    filename_tmpl: '{}'
    io_backend:
      type: disk

network_g:
  type: DualPromptRestormerv3_only_task_prompt
  img_channel: 3
  # dim: None
  # width: None
  enc_blk_nums: [4, 6, 6] 
  middle_blk_num: 8       
  dec_blk_nums: [6, 6, 4]
  refine_blk_num: 4    
  heads: [1, 2, 4, 8]
  ffn_expansion_factor: 2.66
  # bias: False
  LayerNorm_type: 'WithBias'
  
  # 提示池配置
  use_prompt: true
  degradation_pool_size: 15
  degradation_prompt_dim: 1024
  degradation_top_k: 3
  value_num_tokens: 2  # 新增：每个value的token数量
  fusion_method: 'cross_attention'  # 提示与特征的融合方式

# path
path:
  pretrain_network_g: ~
  # param_key_g: params_ema

# validation settings
val:
  save_img: true
  suffix: ~  # add suffix to saved images, if None, use exp name
  pbar: true

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false