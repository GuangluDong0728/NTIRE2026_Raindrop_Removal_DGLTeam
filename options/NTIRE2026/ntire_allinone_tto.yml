# general settings
name: NTIRE_2026_ALLINONE_TTO_FollowMedianTSE_new_1e_5_norotflip_p256_step3_perloss
model_type: NTIREALLINONEModel  # 使用新的多模态模型
scale: 1
num_gpu: 1
manual_seed: 42

# dataset and data loader settings
datasets:
  train:
    name: MultiDatasetPairedImageDataset
    type: MultiDatasetPairedImageDataset
    
    # Batch size for training
    batch_size: 1 # Will be distributed: 4 samples per dataset (24/6=4)
    
    # Global training parameters
    phase: train
    gt_size: 256      # Crop size for GT images
    scale: 1          # Scale factor for super-resolution
    use_hflip: false    # Use horizontal flip
    use_rot: false      # Use rotation
    
    # Configuration for 6 datasets
    datasets:

      - name: "Test_Blur"
        dataroot_gt: "/root/autodl-tmp/unsupervised deraining/unsupervised/results/ALLINONE_TestLQ_onlyBlur_1e_5_90000/visualization/Test_LQ_jpg"
        dataroot_lq: "/root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Test_Blur"
        augment_factor: 1   # 200 images -> 1000 images
        weight: 1.0          # Sampling weight
        io_backend:
          type: disk
        filename_tmpl: "{}"

      - name: "Test_Haze"
        dataroot_gt: "/root/autodl-tmp/unsupervised deraining/unsupervised/results/ALLINONE_TestLQ_medianTSE_onlyHaze_1e_5/visualization/Test_LQ_jpg"
        dataroot_lq: "/root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Test_Haze"
        augment_factor: 1   # 200 images -> 1000 images
        weight: 1.0          # Sampling weight
        io_backend:
          type: disk
        filename_tmpl: "{}"

      - name: "Test_LowLight"
        dataroot_gt: "/root/autodl-tmp/unsupervised deraining/unsupervised/results/ALLINONE_TestLQ_medianTSE_onlyLowLight_1e_5/visualization/Test_LQ_jpg"
        dataroot_lq: "/root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Test_LowLight"
        augment_factor: 1   # 200 images -> 1000 images
        weight: 1.0          # Sampling weight
        io_backend:
          type: disk
        filename_tmpl: "{}"

      - name: "Test_Rain"
        dataroot_gt: "/root/autodl-tmp/unsupervised deraining/unsupervised/results/ALLINONE_TestLQ_medianTSE_onlyRain_1e_5_70000/visualization/Test_LQ_jpg"
        dataroot_lq: "/root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Test_Rain"
        augment_factor: 1   # 200 images -> 1000 images
        weight: 1.0         # Sampling weight
        io_backend:
          type: disk
        filename_tmpl: "{}"

      - name: "Test_Snow"
        dataroot_gt: "/root/autodl-tmp/unsupervised deraining/unsupervised/results/ALLINONE_TestLQ_medianTSE_onlySnow_1e_5/visualization/Test_LQ_jpg"
        dataroot_lq: "/root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Test_Snow"
        augment_factor: 1   # 200 images -> 1000 images
        weight: 1.0          # Sampling weight
        io_backend:
          type: disk
        filename_tmpl: "{}"

    # data loader
    num_worker_per_gpu: 6
    batch_size_per_gpu: 1
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val_1:
    name: Test_Blur
    type: PairedImageDataset
    dataroot_gt: /root/autodl-tmp/unsupervised deraining/unsupervised/results/ALLINONE_TestLQ_onlyBlur_1e_5_90000/visualization/Test_LQ_jpg
    dataroot_lq: /root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Test_Blur
    io_backend:
      type: disk

  val_2:
    name: Test_Haze
    type: PairedImageDataset
    dataroot_gt: /root/autodl-tmp/unsupervised deraining/unsupervised/results/ALLINONE_TestLQ_medianTSE_onlyHaze_1e_5/visualization/Test_LQ_jpg
    dataroot_lq: /root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Test_Haze
    io_backend:
      type: disk

  val_3:
    name: Test_LowLight
    type: PairedImageDataset
    dataroot_gt: /root/autodl-tmp/unsupervised deraining/unsupervised/results/ALLINONE_TestLQ_medianTSE_onlyLowLight_1e_5/visualization/Test_LQ_jpg
    dataroot_lq: /root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Test_LowLight
    io_backend:
      type: disk

  val_4:
    name: Test_Rain
    type: PairedImageDataset
    dataroot_gt: /root/autodl-tmp/unsupervised deraining/unsupervised/results/ALLINONE_TestLQ_medianTSE_onlyRain_1e_5_70000/visualization/Test_LQ_jpg
    dataroot_lq: /root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Test_Rain
    io_backend:
      type: disk

  val_5:
    name: Test_Snow
    type: PairedImageDataset
    dataroot_gt: /root/autodl-tmp/unsupervised deraining/unsupervised/results/ALLINONE_TestLQ_medianTSE_onlySnow_1e_5/visualization/Test_LQ_jpg
    dataroot_lq: /root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Test_Snow
    io_backend:
      type: disk

network_g:
  type: DualPromptRestormerv3_only_task_prompt
  img_channel: 3
  # dim: None
  # width: None
  enc_blk_nums: [4, 6, 6] 
  middle_blk_num: 8       
  dec_blk_nums: [6, 6, 4]
  refine_blk_num: 4    
  heads: [1, 2, 4, 8]
  ffn_expansion_factor: 2.66
  # bias: False
  LayerNorm_type: 'WithBias'
  
  # 提示池配置
  use_prompt: true
  degradation_pool_size: 15
  degradation_prompt_dim: 1024
  degradation_top_k: 3
  value_num_tokens: 2  # 新增：每个value的token数量
  fusion_method: 'cross_attention'  # 提示与特征的融合方式

# path
path:
  pretrain_network_g: experiments/NTIRE_2026_ALLINONE_TTO_FollowMedianTSE_new_1e_5_norotflip_p256_step2/models/net_g_80000.pth
  param_key_g: params

# training settings
train:
  # EMA设置
  # ema_decay: 0.999
  # 基础优化器设置
  optim_g:
    type: Adam
    lr: !!float 1e-5
    weight_decay: 0
    betas: [0.9, 0.99]
  
  # 提示池专用学习率 (通常设置为主网络的0.1-0.5倍)
  prompt_lr: !!float 1e-5  # 提示池使用较小学习率
  
  scheduler:
    type: CosineAnnealingRestartLR
    periods: [500000]
    restart_weights: [1]
    eta_min: !!float 1e-5

  warmup_iter: 0
  # AMP与梯度
  use_amp: true
  grad_clip: 1.0
  
  total_iter: 500000
  # warmup_iter: -1  # no warm up

  # 基础损失函数
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean
  # fft_opt:
  #   type: FFTLoss
  #   loss_weight: 0.1
    
  # # 可选的感知损失
  perceptual_opt:
    type: PerceptualLoss
    layer_weights:
      'conv1_2': 0.1
      'conv2_2': 0.1
      'conv3_4': 1
      'conv4_4': 1
      'conv5_4': 1
    vgg_type: vgg19
    use_input_norm: true
    perceptual_weight: !!float 0.005
    style_weight: 0
    range_norm: false
    criterion: l1
  
  # 提示池多样性约束
  prompt_diversity_weight: !!float 1.0 # 多样性损失权重
  diversity_temperature: !!float 0.1     # 多样性损失温度参数
  
  # # 提示使用均衡性约束
  # prompt_balance_weight: !!float 1.0   # 均衡性损失权重
  # stats_update_freq: 5000                 # 统计更新频率
  # # 可选：添加提示池重新初始化
  # reinit_prompts: false                  # 如果问题严重，重新初始化

  # # 新增损失权重
  # prompt_contrastive_weight: 1.0  # 对比学习损失
  # prompt_orthogonality_weight: 0.1  # 正交性损失

  # === 新增：提示池分析配置 ===
  # 训练时的提示分析设置（可选，影响训练速度）
  enable_prompt_analysis: false           # 是否启用详细提示分析
  prompt_analysis_freq: 50000            # 执行详细分析的频率（迭代数）
  prompt_analysis_save_path: './prompt_analysis'  # 分析结果保存路径
  
  # 注意：训练时不建议启用详细分析，因为会显著增加训练时间
  # 建议在关键检查点（如50k, 100k迭代）手动启用一次

# validation settings
val:
  val_freq: !!float 10000
  save_img: false
  pbar: true

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 10000
  use_tb_logger: true
  # wandb:
  #   project: MultiDomain_Image_Restoration
  #   resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500

# === 额外说明 ===
# 1. 确保所有JSON文本描述文件都已生成并放在指定路径
# 2. 如果CLIP加载失败，系统会自动禁用CLIP约束继续训练
# 3. 提示池学习率建议设置为主网络的0.1-0.5倍
# 4. 各种损失权重可以根据实验效果调整
# 5. 建议先用较小的数据集测试配置是否正确